<!DOCTYPE html>
<html lang="en">
    {% include head.html %}
    <body data-spy="scroll" data-target="#toc">
        {% include navigation.html %}
        <div id="wrappper clear-top">
        <div class="container">
                {% if page.toc %}
                <div class="row-fluid">
                    <div class="col-sm-3">
                    <nav id="toc" data-spy="affix" data-toggle="toc" class="affix"></nav>
                    </div>
                    <div class="col-sm-9">
                        {{ content }}
                    </div>
                </div>
                {% else %}
                <div class="container">
                    {{ content }}
                    <br>
                </div>
                {% endif %}
        </div> <!--End of container --!>
        </div> <!--End of wrapper --!>
        {% include footer.html %}
        {% include javascript.html %}
        {% include analytics.html %}
    </body>
</html>
